<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrgFlow AI</title>
    <!--
      H-006: prevent theme FOUC. Apply the persisted theme to <html> before
      React mounts so the first paint is already in the right palette. This
      mirrors the ThemeProvider logic; both must stay in sync with the
      storage key 'orgflow:theme'.
    -->
    <script>
      (function () {
        try {
          var KEY = 'orgflow:theme';
          var stored = window.localStorage.getItem(KEY);
          var pref =
            stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = pref === 'system' ? (prefersDark ? 'dark' : 'light') : pref;
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
          root.style.colorScheme = resolved;
        } catch (_) {
          /* best-effort; ThemeProvider will fix it on mount */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
